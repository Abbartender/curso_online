<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Curso Online de Coctelería</title>

<style>
body{
  margin:0;
  background:#060606;
  color:#fff;
  font-family:Arial, sans-serif;
  text-align:center;
}

section{
  padding:80px 20px;
  max-width:700px;
  margin:auto;
}

h1{
  font-size:48px;
  margin-bottom:20px;
}

button{
  padding:16px 28px;
  border:none;
  cursor:pointer;
  font-size:16px;
  margin-top:20px;
}

.cta{
  background:#25D366;
  color:#000;
}

.modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.9);
  justify-content:center;
  align-items:center;
}

.modal.active{
  display:flex;
}

.modal-box{
  background:#111;
  padding:30px;
  width:90%;
  max-width:400px;
}

input, textarea{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#000;
  color:#fff;
  border:1px solid #333;
}

iframe{
  width:100%;
  height:315px;
}
</style>
</head>

<body>

<section>
  <h1>Curso Online de Coctelería</h1>
  <p>Aprendé desde tu casa con metodología profesional</p>

  <button onclick="openModal()">Descargar Guía Gratis</button>

  <div style="margin-top:20px;">
    <a href="https://wa.me/543512857799?text=QUIERO%20MAS%20INFO%20DEL%20CURSO%20ONLINE">
      <button class="cta">Hablar por WhatsApp</button>
    </a>
  </div>
</section>

<section>
  <h2>Conocé el programa</h2>

  <iframe src="https://www.youtube.com/embed/SMNP2Ifo7E8" 
  frameborder="0" allowfullscreen></iframe>
</section>

<div class="modal" id="modal">
  <div class="modal-box">

    <h3>Descargá la guía</h3>

    <form id="form">

      <input type="text" name="name" placeholder="Nombre" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="tel" name="phone" placeholder="Teléfono">

      <button type="submit">Enviar y descargar</button>

    </form>

    <p id="msg"></p>

    <button onclick="closeModal()">Cerrar</button>

  </div>
</div>

<script>

function openModal(){
  document.getElementById('modal').classList.add('active')
}

function closeModal(){
  document.getElementById('modal').classList.remove('active')
}

const form = document.getElementById('form')
const msg = document.getElementById('msg')

form.addEventListener('submit', async (e)=>{
  e.preventDefault()

  msg.innerText = "Enviando..."

  const data = new FormData(form)

  try{

    const res = await fetch("https://formspree.io/f/mpqbazbv",{
      method:"POST",
      body:data,
      headers:{
        "Accept":"application/json"
      }
    })

    if(res.ok){

      msg.innerText = "Descargando guía..."

      const link = document.createElement('a')
      link.href = "guia-gratis-cocteleria.pdf"
      link.download = "guia-gratis-cocteleria.pdf"
      document.body.appendChild(link)
      link.click()
      document.body.removeChild(link)

      form.reset()

    }else{
      msg.innerText = "Error al enviar"
    }

  }catch{
    msg.innerText = "Error de conexión"
  }

})

</script>

</body>
</html>
